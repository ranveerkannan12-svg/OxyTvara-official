<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyTvara — Revise Smarter</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28; --border: #2a2a3d;
            --accent: #7c6cff; --accent2: #ff6c9d; --accent3: #6cffcf; --text: #e8e8f0;
            --muted: #6b6b80; --glow: rgba(124, 108, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; overflow-x: hidden;
        }

        /* Background Glows */
        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: radial-gradient(circle at 10% 15%, rgba(124,108,255,0.1), transparent 50%),
                        radial-gradient(circle at 90% 85%, rgba(255,108,157,0.07), transparent 50%);
        }

        /* Auth Card */
        .auth-wrap { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 24px; 
            width: 100%; max-width: 420px; padding: 35px; animation: fadeUp 0.4s ease; 
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .auth-logo { text-align: center; margin-bottom: 25px; font-family: 'Syne', sans-serif; }
        .logo-pill { 
            background: linear-gradient(135deg, var(--accent), var(--accent2)); 
            padding: 10px 20px; border-radius: 12px; display: inline-block; color: #fff; font-weight: 800;
        }

        /* Tabs & Inputs */
        .auth-tabs { display: flex; background: var(--surface2); padding: 5px; border-radius: 12px; margin-bottom: 20px; }
        .auth-tab { flex: 1; padding: 10px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-radius: 8px; font-weight: 500; transition: 0.2s; }
        .auth-tab.active { background: var(--accent); color: #fff; }

        .form-group { margin-bottom: 15px; }
        .form-input { 
            width: 100%; padding: 12px; background: var(--surface2); border: 1px solid var(--border); 
            border-radius: 10px; color: #fff; outline: none; transition: 0.2s;
        }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }

        .auth-submit { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .auth-submit:hover { opacity: 0.9; transform: translateY(-1px); }

        /* App Layout (Hidden by default) */
        .app { display: none; height: 100vh; z-index: 2; position: relative; }
        .app.visible { display: flex; }

        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 30px; }

        /* Flashcards */
        .flashcard-scene { perspective: 1000px; width: 100%; max-width: 400px; height: 250px; cursor: pointer; margin: 20px auto; }
        .flashcard-inner { 
            position: relative; width: 100%; height: 100%; transition: transform 0.6s; 
            transform-style: preserve-3d; 
        }
        .flashcard-inner.flipped { transform: rotateY(180deg); }
        .flashcard-face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            display: flex; align-items: center; justify-content: center; padding: 20px;
            border-radius: 20px; border: 1px solid var(--border); background: var(--surface2);
            font-family: 'Syne', sans-serif; font-size: 1.2rem; text-align: center;
        }
        .flashcard-back { transform: rotateY(180deg); background: var(--glow); color: var(--accent); }
    </style>
</head>
<body>

    <div class="auth-wrap" id="authSection">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-pill">OXYTVARA</div>
                <p style="margin-top:10px; font-size: 0.8rem; color: var(--muted)">REVISE SMARTER</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab(this, 'login')">Login</button>
                <button class="auth-tab" onclick="switchTab(this, 'signup')">Register</button>
            </div>

            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <input type="email" class="form-input" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="password" class="form-input" placeholder="Password" required>
                </div>
                <button type="submit" class="auth-submit">Get Started</button>
            </form>
        </div>
    </div>

    <div class="app" id="appSection">
        <aside class="sidebar">
            <div style="padding: 20px; font-weight: 800; font-family: 'Syne'">OXYTVARA</div>
            <nav style="padding: 10px;">
                <div style="padding: 10px; color: var(--accent)">Dashboard</div>
                <div style="padding: 10px; color: var(--muted)">My Notes</div>
                <div style="padding: 10px; color: var(--muted)">Flashcards</div>
            </nav>
        </aside>
        
        <main class="main">
            <h1 style="font-family: 'Syne'; margin-bottom: 20px;">Welcome back, Scholar</h1>
            
            <div class="flashcard-scene" onclick="this.querySelector('.flashcard-inner').classList.toggle('flipped')">
                <div class="flashcard-inner">
                    <div class="flashcard-face flashcard-front">
                        What is the powerhouse of the cell?
                    </div>
                    <div class="flashcard-face flashcard-back">
                        The Mitochondria
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function switchTab(el, mode) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            // Logic to change form labels could go here
        }

        function handleAuth(e) {
            e.preventDefault();
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').classList.add('visible');
        }
    </script>
</body>
</html>
